name: Build App

on: [push, workflow_dispatch]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: delivery_app_android
          path: build/app/outputs/flutter-apk/app-release.apk

  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Очищаем кэш и принудительно обновляем CDN-репозиторий без клонирования гита
      - name: Setup CocoaPods Repo
        run: |
          pod repo remove trunk || true
          pod repo add-cdn trunk https://cdn.cocoapods.org/

      - name: Build iOS
        run: |
          flutter pub get
          # Флаг --no-pub ускоряет процесс, так как pub get мы уже сделали
          flutter build ios --release --no-codesign --no-pub -t lib/main.dart
        env:
          # Заставляем CocoaPods качать строго последовательно, без разрыва соединений
          COCOAPODS_PARALLEL_FETCH_SIZE: 1

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: delivery_app_ios
          path: build/ios/iphoneos