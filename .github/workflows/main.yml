name: Build App

on: [push, workflow_dispatch]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: delivery_app_android
          path: build/app/outputs/flutter-apk/app-release.apk

  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Build iOS Dependencies
        run: |
          flutter pub get
          cd ios
          # Очищаем старые нативные бинарники из кэша CocoaPods, чтобы флаг -G не вылез из старых логов
          pod cache clean --all
          pod install --repo-update
          cd ..

      - name: Build iOS App
        run: |
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign --no-pub -t lib/main.dart

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: delivery_app_ios
          path: build/ios/iphoneos