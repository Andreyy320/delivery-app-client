name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Modern iOS
        run: |
          flutter config --no-analytics
          flutter pub get
          
          # 1. Сносим и создаем заново
          rm -rf ios
          flutter create . --platforms=ios
          
          # 2. ПРИНУДИТЕЛЬНО прописываем 13.0 во ВСЕ конфиги, которые Flutter создает
          # Мы меняем не только 10.0, а вообще любое упоминание версии на 13.0
          find ios -type f -name "*.xcconfig" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} +
          find ios -type f -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} +
          
          # 3. Добавляем фикс в Podfile, чтобы он ПЕРЕЗАПИСЫВАЛ настройки подов
          cd ios
          echo "post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end" >> Podfile
          
          pod install || true
          cd ..
          
      - name: Build IPA
        run: flutter build ios --release --no-codesign --deployment-target=13.0

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app
          path: build/ios/iphoneos/*.app
