name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Build iOS 13
        run: |
          flutter pub get
          
          # 1. Сносим и пересоздаем (лечит битые файлы)
          rm -rf ios
          flutter create . --platforms=ios
          
          # 2. Магический скрипт: форсируем 13.0 для ВСЕХ подов и таргетов
          cd ios
          echo "post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end" >> Podfile
          
          pod install || true
          cd ..
          
      - name: Build IPA
        run: flutter build ios --release --no-codesign --config-only
        
      - name: Final Compile
        run: |
          # Собираем через xcodebuild напрямую, чтобы обойти глюки Flutter CLI
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app_ipa
          path: build/ios/iphoneos/*.app
