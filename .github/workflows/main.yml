name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Surgical Fix and Build
        run: |
          flutter pub get
          rm -rf ios
          flutter create . --platforms=ios
          
          # У заходим в папку ios
          cd ios
          
          # ПЕРЕЗАПИСЫВАЕМ Podfile полностью на рабочий вариант
          cat <<EOF > Podfile
          platform :ios, '13.0'
          
          # Это магическая строчка, которая связывает Flutter и Pods
          load File.join(File.dirname(File.realpath(__FILE__)), 'Flutter', 'podhelper.rb')
          
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                # Вот тут мы убиваем ошибку -G наповал
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          EOF
          
          pod install
          cd ..
          
      - name: Build IPA
        run: flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app_bundle
          path: build/ios/iphoneos/*.app
