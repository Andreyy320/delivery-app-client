name: Build_IPA_Simple
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build
        run: |
          flutter pub get
          # Фикс версии, чтобы Xcode не ругался на -G
          find ios -name "*.pbxproj" -exec sed -i '' 's/10.0/13.0/g' {} +
          
          # Сборка без проверок подписи
          flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app_ready
          path: build/ios/iphoneos/*.app
