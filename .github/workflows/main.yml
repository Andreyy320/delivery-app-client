name: Build App

on: [push, workflow_dispatch]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: delivery_app_android
          path: build/app/outputs/flutter-apk/app-release.apk

  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ФИКС: Вместо медленного CDN скачиваем оптимизированный легковесный слепок репозитория CocoaPods
      - name: Fetch Lightweight CocoaPods Specs
        run: |
          mkdir -p ~/.cocoapods/repos
          git clone --depth=1 https://github.com/CocoaPods/Specs.git ~/.cocoapods/repos/trunk

      - name: Build iOS
        run: |
          flutter pub get
          # Запускаем сборку, пропуская повторный pub get
          flutter build ios --release --no-codesign --no-pub -t lib/main.dart