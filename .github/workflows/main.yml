name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kill iOS 10 and Build
        run: |
          flutter pub get
          
          # 1. Полный снос старого
          rm -rf ios
          flutter create . --platforms=ios
          
          # 2. ПРИНУДИТЕЛЬНАЯ ЗАМЕНА ВЕРСИИ ВО ВСЕХ КОНФИГАХ (Xcode и Flutter)
          find . -type f \( -name "*.pbxproj" -o -name "*.xcconfig" -o -name "Podfile" \) -exec sed -i '' 's/10.0/13.0/g' {} +
          find . -type f \( -name "*.pbxproj" -o -name "*.xcconfig" -o -name "Podfile" \) -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} +
          
          # 3. Установка подов
          cd ios
          pod install || true
          cd ..
          
      - name: Build IPA
        run: flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app_ipa
          path: build/ios/iphoneos/*.app
