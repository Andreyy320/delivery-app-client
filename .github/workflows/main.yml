name: Build_IPA_Final_Attempt
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Hard Fix iOS Config
        run: |
          flutter pub get
          rm -rf ios
          flutter create . --platforms=ios
          
          # ЖЕСТКИЙ ФИКС: Ищем все упоминания 10.0 и меняем на 13.0
          # Это уберет причину появления ошибки -G
          find ios -type f \( -name "*.pbxproj" -o -name "*.xcconfig" \) -exec sed -i '' 's/10.0/13.0/g' {} +
          
          # Настройка Podfile, чтобы зависимости тоже не просили iOS 10
          cd ios
          echo "post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end" >> Podfile
          pod install
          cd ..

      - name: Final Build
        run: flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app_bundle
          path: build/ios/iphoneos/*.app
