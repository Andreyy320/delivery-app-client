name: Build_IPA_Final_v2
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Inject Version Fix
        run: |
          flutter pub get
          rm -rf ios
          flutter create . --platforms=ios
          
          # 1. Сначала меняем версию в самом проекте Xcode
          find ios -type f -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} +
          
          # 2. УМНАЯ ЗАМЕНА В Podfile:
          # Мы находим стандартный flutter_additional_ios_build_settings(target) 
          # и сразу после него вставляем принудительную установку версии 13.0
          sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each do |config| \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                end' ios/Podfile

          # 3. Запускаем сборку
          flutter build ios --release --no-codesign
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app_ready
          path: build/ios/iphoneos/*.app
