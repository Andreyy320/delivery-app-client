name: Get_My_IPA
on: [push, workflow_dispatch]

jobs:
  build:
    # Используем старую систему, которая не ругается на флаг -G
    runs-on: macos-13
    
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build
        run: |
          flutter pub get
          # Собираем как есть, без исправлений
          flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app
          path: build/ios/iphoneos/*.app
