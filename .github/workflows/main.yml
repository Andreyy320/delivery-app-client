name: Build App

on: [push, workflow_dispatch]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: delivery_app_android
          path: build/app/outputs/flutter-apk/app-release.apk

  build_ios:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          flutter pub get

      # ФИКС: Жестко связываем нативный фреймворк Flutter, чтобы плагины его нашли
      - name: Force Link Flutter Framework
        run: |
          cd ios
          flutter precache --ios
          mkdir -p Flutter
          # Копируем метаданные сборки во внутреннюю папку ios
          cp -r $FLUTTER_ROOT/bin/cache/artifacts/engine/ios-release/Flutter.xcframework Flutter/
          cd ..

      - name: Install pods
        run: |
          cd ios
          pod deintegrate
          pod install --repo-update
          cd ..

      - name: Build iOS
        run: |
          # Собираем напрямую, отключая повторный pub get
          flutter build ios --release --no-codesign --no-pub

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: delivery_app_ios
          path: build/ios/iphoneos