name: Build_My_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: Result_IPA
          path: build/ios/iphoneos/*.app
