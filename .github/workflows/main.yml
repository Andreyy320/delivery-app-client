name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix Project
        run: |
          flutter create . --platforms=ios
          flutter pub get
          # Исправляем версию iOS на 13.0 во всех файлах проекта
          find . -type f -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} +
          cd ios
          rm -f Podfile
          pod install || true
          
      - name: Build IPA
        run: flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app_ipa
          path: build/ios/iphoneos/*.app
