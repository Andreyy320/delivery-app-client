name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix iOS Version and Build
        run: |
          flutter create . --platforms=ios
          flutter pub get
          # Поднимаем версию iOS до 13.0, чтобы не было ошибки -G
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' ios/Runner.xcodeproj/project.pbxproj
          cd ios
          rm -f Podfile
          pod install || true
          
      - name: Build IPA
        run: flutter build ios --release --no-codesign --target-platform ios-arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app_ipa
          path: build/ios/iphoneos/*.app
