name: Build_IPA_Final
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Total Clean and Force iOS 13
        run: |
          # 1. Чистим всё
          flutter pub get
          rm -rf ios
          flutter create . --platforms=ios
          
          # 2. ЖЕСТКИЙ ФИКС: Меняем 10.0 на 13.0 везде, включая скрытые настройки Xcode
          # Это уберет ту самую ошибку "-G"
          find ios -type f \( -name "*.pbxproj" -o -name "*.xcconfig" -o -name "Podfile" \) -exec sed -i '' 's/10.0/13.0/g' {} +
          
          # 3. Настройка Podfile для всех зависимостей (Firebase и прочее)
          cd ios
          echo "post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end" >> Podfile
          
          pod install || true
          cd ..

      - name: Build
        run: flutter build ios --release --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app_ready
          path: build/ios/iphoneos/*.app
