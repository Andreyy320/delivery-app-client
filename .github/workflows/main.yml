name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Just Build It
        run: |
          flutter pub get
          
          # Сносим старое, создаем чистое (как хочет Flutter)
          rm -rf ios
          flutter create . --platforms=ios
          
          # ПУБЛИЧНОЕ ИСПРАВЛЕНИЕ:
          # Просто меняем 10.0 на 13.0 во всех файлах, которые только что создались
          sed -i '' 's/10.0/13.0/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Запускаем сборку. Flutter сам создаст нужный Podfile и сам всё скачает.
          flutter build ios --release --no-codesign
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app_ready
          path: build/ios/iphoneos/*.app
