name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build and Fix
        run: |
          flutter pub get
          
          # 1. Пересоздаем папку ios (на всякий случай)
          rm -rf ios
          flutter create . --platforms=ios
          
          # 2. Правим версию iOS на 13.0 только в проекте
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 3. Вписываем платформу в Podfile (без pod init)
          cd ios
          echo "platform :ios, '13.0'" > Podfile.tmp
          cat Podfile >> Podfile.tmp
          mv Podfile.tmp Podfile
          
          pod install || true
          cd ..
          
      - name: Build IPA
        run: flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app_ipa
          path: build/ios/iphoneos/*.app
