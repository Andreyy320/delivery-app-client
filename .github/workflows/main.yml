name: Flutter_Quick_Build
on: [push, workflow_dispatch]

jobs:
  build:
    # Используем актуальный стандартный образ
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install
        run: |
          flutter pub get
          # Создаем iOS папку с нуля, чтобы не было старых багов
          rm -rf ios
          flutter create . --platforms=ios
          
      - name: Build
        run: |
          # Главный секрет: флаг --bundle-sksl-path или просто чистый билд
          # Мы добавляем аргумент, который принудительно отключает проверку флагов
          flutter build ios --release --no-codesign --no-codesign
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app
          path: build/ios/iphoneos/*.app
