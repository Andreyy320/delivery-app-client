name: Build_IPA_Final_v3
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Kill Error G and Build
        run: |
          flutter pub get
          rm -rf ios
          flutter create . --platforms=ios
          
          # 1. Меняем версию на 13.0 везде
          find ios -type f -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} +
          
          # 2. УДАЛЯЕМ флаг -G, который бесит Xcode
          find ios -type f -name "*.pbxproj" -exec sed -i '' 's/-G//g' {} +
          
          # 3. Умная вставка версии в Podfile
          sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each do |config| \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                  config.build_settings["GCC_ GENERIC_VALUE_PROPAGATION"] = "NO" \
                end' ios/Podfile

          # 4. Собираем
          flutter build ios --release --no-codesign
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app_ready
          path: build/ios/iphoneos/*.app
