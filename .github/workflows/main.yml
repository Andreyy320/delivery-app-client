name: Deploy_To_Web
on:
  push:
    branches: [ main ] # или master, смотря какая у тебя главная

jobs:
  build:
    runs-on: ubuntu-latest # Веб собирается на дешевеньком Linux, это быстро
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web
        run: |
          flutter pub get
          # Собираем веб-версию с использованием HTML рендерера (лучше для мобилок)
          flutter build web --release --web-renderer html --base-href /${{ github.event.repository.name }}/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web # Папка, которую нужно опубликовать
          branch: gh-pages # Ветка, где будет лежать сайт
