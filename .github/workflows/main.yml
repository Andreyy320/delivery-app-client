name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Podfile and Build
        run: |
          flutter pub get
          
          # Заходим в папку ios (создаем её если пустая)
          flutter create . --platforms=ios
          cd ios
          
          # РУЧНОЕ СОЗДАНИЕ PODFILE (чтобы точно не 10.0)
          cat <<EOF > Podfile
          platform :ios, '13.0'
          use_frameworks!
          target 'Runner' do
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          EOF

          # Принудительно правим версию в проекте Xcode
          find . -type f -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} +
          
          pod install || true
          cd ..
          
      - name: Build IPA
        run: flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app_ipa
          path: build/ios/iphoneos/*.app
