name: Build App

on: [push, workflow_dispatch]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: delivery_app_android
          path: build/app/outputs/flutter-apk/app-release.apk

  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ФИКС: Увеличиваем буферы Git и включаем быструю загрузку, чтобы клонирование Firebase не обрывалось
      - name: Optimize Git Configuration
        run: |
          git config --global http.postBuffer 524288000
          git config --global https.postBuffer 524288000
          git config --global core.compression 0

      - name: Build iOS
        run: |
          flutter pub get
          flutter build ios --release --no-codesign -t lib/main.dart

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: delivery_app_ios
          path: build/ios/iphoneos