name: Simple_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Just Build It
        run: |
          flutter pub get
          
          # 1. Просто поднимаем версию во всех файлах, где она может быть
          find . -type f -name "*" -print0 | xargs -0 sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' || true
          
          # 2. Собираем. БЕЗ дополнительных настроек подов.
          # Если не соберется для девайса, соберем для симулятора (это быстрее и проще)
          flutter build ios --release --no-codesign
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app_file
          path: build/ios/iphoneos/*.app
