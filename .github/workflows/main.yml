name: Build_IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reconstruct iOS folder
        run: |
          # Эта команда создаст недостающие файлы ios, если их нет
          flutter create . --platforms=ios
          flutter pub get
          cd ios
          # Удаляем старый Podfile, чтобы Flutter создал новый и правильный
          rm -f Podfile
          pod install || true

      - name: Build IPA
        run: flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my_app_ipa
          path: build/ios/iphoneos/*.app
